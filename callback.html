<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autorización TikTok - León de Judá</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    max-width: 640px;
    margin: 60px auto;
    padding: 0 24px;
    line-height: 1.6;
    color: #1a1a1a;
    background: #fafafa;
  }
  h1 { font-size: 22px; }
  .card {
    background: white;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 24px;
    margin-top: 20px;
  }
  .code-box {
    background: #f0f4ff;
    border: 1px solid #c7d6ff;
    border-radius: 8px;
    padding: 16px;
    font-family: "Courier New", monospace;
    font-size: 14px;
    word-break: break-all;
    margin: 12px 0;
  }
  button {
    background: #0066cc;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  button:hover { background: #0052a3; }
  .error { color: #cc0000; }
  .label { font-weight: 600; font-size: 13px; color: #555; margin-top: 16px; }
  .hint { color: #888; font-size: 13px; margin-top: 20px; }
</style>
</head>
<body>
  <h1>Autorización de TikTok</h1>
  <div class="card" id="result">Leyendo respuesta de TikTok...</div>
  <p class="hint">Esta página solo muestra el código en tu propio navegador — no se envía ni se guarda en ningún servidor externo.</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const errorDesc = params.get('error_description');
    const resultDiv = document.getElementById('result');

    if (error) {
      resultDiv.innerHTML = `
        <p class="error"><strong>Error de autorización:</strong> ${error}</p>
        <p>${errorDesc || ''}</p>
      `;
    } else if (code) {
      resultDiv.innerHTML = `
        <p>Autorización exitosa. Copia este código y pégalo en tu script cuanto antes (expira en pocos minutos):</p>
        <div class="label">CODE</div>
        <div class="code-box" id="codeBox">${code}</div>
        <button onclick="copyCode()">Copiar código</button>
        ${state ? `<div class="label">STATE</div><div class="code-box">${state}</div>` : ''}
      `;
    } else {
      resultDiv.innerHTML = `<p>No se recibió ningún código en la URL. Vuelve a intentar el proceso de autorización.</p>`;
    }

    function copyCode() {
      navigator.clipboard.writeText(code);
      const btn = document.querySelector('button');
      btn.textContent = '¡Copiado!';
      setTimeout(() => { btn.textContent = 'Copiar código'; }, 1500);
    }
  </script>
</body>
</html>
